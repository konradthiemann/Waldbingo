<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#2d6a4f">
<link rel="manifest" href="manifest.webmanifest">
<title>🌲 Waldbingo</title>
<style>
  :root{
    --green:#2d6a4f; --green-d:#1b4332; --green-l:#6b8f71;
    --bg:#f8f9f0; --card:#ffffff; --ink:#1b2a20; --muted:#5c6b5f;
    --accent:#d97706; --line:#cdd9ce; --ok:#2d8a4f;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.45}
  header.app{background:var(--green);color:#fff;padding:14px 16px;
    display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:5}
  header.app h1{font-size:20px;margin:0;font-weight:800;letter-spacing:.3px}
  header.app .sub{font-size:12px;opacity:.85;margin-left:auto;text-align:right}
  main{max-width:980px;margin:0 auto;padding:16px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;
    padding:18px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
  h2{font-size:16px;margin:0 0 12px;color:var(--green-d)}
  label.field{display:block;font-size:13px;font-weight:600;color:var(--muted);
    margin:12px 0 6px}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{border:1.5px solid var(--line);background:#fff;border-radius:999px;
    padding:8px 14px;font-size:14px;cursor:pointer;user-select:none;transition:.12s}
  .chip:hover{border-color:var(--green-l)}
  .chip.on{background:var(--green);color:#fff;border-color:var(--green)}
  .row{display:flex;gap:12px;flex-wrap:wrap;align-items:end}
  .row > div{flex:1;min-width:140px}
  select,input[type=number],input[type=text]{width:100%;padding:10px;border:1.5px solid var(--line);
    border-radius:10px;font-size:15px;background:#fff}
  .btn{display:inline-flex;align-items:center;gap:8px;background:var(--green);color:#fff;
    border:none;border-radius:12px;padding:13px 20px;font-size:16px;font-weight:700;
    cursor:pointer;transition:.12s}
  .btn:hover{background:var(--green-d)}
  .btn.secondary{background:#fff;color:var(--green-d);border:1.5px solid var(--green-l)}
  .btn.ghost{background:transparent;color:#fff;border:1.5px solid rgba(255,255,255,.5);
    padding:8px 14px;font-size:14px}
  .btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
  .hint{font-size:12.5px;color:var(--muted);margin-top:6px}
  .ctx-banner{display:flex;flex-wrap:wrap;gap:8px 16px;font-size:13px;color:var(--green-d);
    background:#eef4ec;border:1px solid var(--line);border-radius:12px;padding:10px 14px;margin-bottom:14px}
  .ctx-banner b{color:var(--ink)}
  /* Bingo grid */
  .player-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
  .player-tabs .chip{padding:6px 12px;font-size:13px}
  .bingo{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;max-width:560px;margin:0 auto}
  .cell{position:relative;aspect-ratio:1;background:var(--bg);border:1.5px solid var(--green-l);
    border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:4px;cursor:pointer;text-align:center;overflow:hidden;transition:.12s}
  .cell .emoji{font-size:clamp(20px,7vw,34px);line-height:1}
  .cell .nm{font-size:clamp(8px,2.3vw,11px);font-weight:600;margin-top:2px;color:var(--ink)}
  .cell.found{background:#dff3e3;border-color:var(--ok)}
  .cell.found::after{content:"✓";position:absolute;top:3px;right:5px;color:var(--ok);
    font-weight:900;font-size:14px}
  .cell .info-dot{position:absolute;bottom:2px;right:4px;font-size:11px;opacity:.45}
  .legend{font-size:12px;color:var(--muted);text-align:center;margin-top:10px}
  /* Modal */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;
    align-items:center;justify-content:center;padding:18px;z-index:20}
  .modal-bg.show{display:flex}
  .modal{background:#fff;border-radius:18px;max-width:420px;width:100%;padding:22px;
    box-shadow:0 12px 40px rgba(0,0,0,.3)}
  .modal .big{font-size:54px;text-align:center;line-height:1}
  .modal h3{text-align:center;margin:6px 0 4px;color:var(--green-d)}
  .modal .kat{text-align:center;font-size:12px;color:var(--muted);margin-bottom:14px}
  .modal .info-block{margin:12px 0}
  .modal .info-block .t{font-size:12px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.5px}
  .modal .info-block .v{font-size:15px}
  .modal .close{margin-top:8px;width:100%}
  .modal .found-btn{width:100%;margin-top:14px}
  .stat{font-size:13px;color:var(--muted);text-align:center;margin-top:8px}
  /* Print */
  .print-only{display:none}
  @media print{
    header.app,.no-print{display:none !important}
    body{background:#fff}
    main{max-width:none;padding:0;margin:0}
    .print-only{display:block}
    .print-page{page-break-after:always;padding:8mm}
    .print-page:last-child{page-break-after:auto}
    .pcard{border:2px solid var(--green);border-radius:10px;padding:8px;margin-bottom:8mm}
    .pcard h3{margin:0 0 6px;color:var(--green);text-align:center;font-size:15px}
    .pgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:3px}
    .pcell{border:1px solid #6b8f71;border-radius:6px;aspect-ratio:1;display:flex;
      flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2px}
    .pcell .e{font-size:26px}.pcell .n{font-size:8px;font-weight:600}
    .pctx{font-size:10px;text-align:center;color:#333;margin-bottom:4px}
  }
</style>
</head>
<body>
<header class="app">
  <h1>🌲 Waldbingo</h1>
  <div class="sub" id="hdrSub">Prototyp · offline-fähig</div>
</header>

<main>
  <!-- SETUP -->
  <section id="setup" class="card">
    <h2>1 · Wo & wann seid ihr unterwegs?</h2>

    <label class="field">Jahreszeit</label>
    <div class="chips" id="ch-season"></div>

    <label class="field">Wetter <span id="wxAuto" class="hint" style="display:none"></span></label>
    <div class="chips" id="ch-weather"></div>

    <label class="field">Tageszeit</label>
    <div class="chips" id="ch-time"></div>

    <label class="field">Wo seid ihr? (Habitat)</label>
    <div class="chips" id="ch-habitat"></div>

    <div class="row" style="margin-top:16px">
      <div>
        <label class="field" style="margin:0 0 6px">Schwierigkeit</label>
        <select id="difficulty">
          <option value="1">Leicht (kleine Kinder)</option>
          <option value="2" selected>Mittel</option>
          <option value="3">Experte (auch seltene Funde)</option>
        </select>
      </div>
      <div>
        <label class="field" style="margin:0 0 6px">Anzahl Spieler (1–10)</label>
        <input type="number" id="players" min="1" max="10" value="1">
      </div>
      <div>
        <label class="field" style="margin:0 0 6px">Seed (optional)</label>
        <input type="text" id="seed" placeholder="z. B. wald42">
      </div>
    </div>

    <div class="btn-row">
      <button class="btn secondary" id="btnAuto">📍 Automatisch (Standort & Wetter)</button>
      <button class="btn" id="btnGen">🎲 Bingo erstellen</button>
    </div>
    <div class="hint" id="autoMsg"></div>
    <div class="hint">Tipp: Erst online erstellen (lädt Wetter), dann offline in den Wald – Abhaken und Infos gehen ohne Netz.</div>
  </section>

  <!-- GAME -->
  <section id="game" class="card" style="display:none">
    <div class="ctx-banner" id="ctxBanner"></div>
    <div class="player-tabs no-print" id="playerTabs"></div>
    <div class="bingo" id="bingo"></div>
    <div class="stat" id="stat"></div>
    <div class="legend">Tippe ein Feld an, wenn du es gefunden hast. Tippe auf ❓ für mehr Infos.</div>
    <div class="btn-row no-print">
      <button class="btn secondary" id="btnPrint">🖨️ Drucken / als PDF (alle Spieler)</button>
      <button class="btn secondary" id="btnInfoSheet">📄 Info-Begleitseite drucken</button>
      <button class="btn ghost" style="color:var(--green-d);border-color:var(--green-l)" id="btnBack">↩︎ Neues Spiel</button>
    </div>
  </section>

  <!-- PRINT AREA -->
  <div id="printArea" class="print-only"></div>
</main>

<!-- Info Modal -->
<div class="modal-bg" id="modalBg">
  <div class="modal" id="modal"></div>
</div>

<script src="objects.data.js"></script>
<script>
/* ---------- Daten & Vokabular ---------- */
const DATA = (window.WB_DATA && window.WB_DATA.objekte) || [];
const SEASONS = [["fruehling","Frühling 🌸"],["sommer","Sommer ☀️"],["herbst","Herbst 🍂"],["winter","Winter ❄️"]];
const WEATHER = [["klar","Klar ☀️"],["bewoelkt","Bewölkt ☁️"],["regen","Regen 🌧️"],["nach_regen","Nach Regen 💧"],["schnee","Schnee 🌨️"],["frost","Frost 🧊"],["wind","Wind 💨"],["nebel","Nebel 🌫️"]];
const TIMES = [["morgen","Morgen"],["tag","Tag"],["abend","Abend"],["daemmerung","Dämmerung"],["nacht","Nacht"]];
const HABITATS = [["laubwald","Laubwald"],["nadelwald","Nadelwald"],["mischwald","Mischwald"],["gewaesser","Am Wasser"],["lichtung","Lichtung"],["feldrand","Feldrand"],["park","Park"],["gebirge","Gebirge"]];

/* ---------- Zustand ---------- */
const state = { season:null, weather:null, time:null, habitat:null,
  cards:[], activePlayer:0, found:[] };

/* ---------- Auswahl-Chips (single-select Gruppen) ---------- */
function buildChips(containerId, opts, key){
  const c = document.getElementById(containerId);
  opts.forEach(([val,label])=>{
    const el = document.createElement('div');
    el.className='chip'; el.textContent=label; el.dataset.val=val;
    el.onclick=()=>{ state[key]=val;
      [...c.children].forEach(x=>x.classList.toggle('on',x.dataset.val===val)); };
    c.appendChild(el);
  });
}
function setChip(containerId,val,key){
  state[key]=val;
  const c=document.getElementById(containerId);
  [...c.children].forEach(x=>x.classList.toggle('on',x.dataset.val===val));
}
buildChips('ch-season',SEASONS,'season');
buildChips('ch-weather',WEATHER,'weather');
buildChips('ch-time',TIMES,'time');
buildChips('ch-habitat',HABITATS,'habitat');

/* ---------- Auto-Defaults aus Datum/Uhrzeit ---------- */
function seasonFromDate(d){const m=d.getMonth()+1;
  if(m>=3&&m<=5)return'fruehling';if(m>=6&&m<=8)return'sommer';if(m>=9&&m<=11)return'herbst';return'winter';}
function timeFromHour(h){if(h>=5&&h<10)return'morgen';if(h<17)return'tag';if(h<20)return'abend';if(h<22)return'daemmerung';return'nacht';}
(function initDefaults(){
  const now=new Date();
  setChip('ch-season',seasonFromDate(now),'season');
  setChip('ch-time',timeFromHour(now.getHours()),'time');
  setChip('ch-weather','bewoelkt','weather');
  setChip('ch-habitat','mischwald','habitat');
})();

/* ---------- Seeded RNG (mulberry32) ---------- */
function strToSeed(s){let h=1779033703^s.length;for(let i=0;i<s.length;i++){h=Math.imul(h^s.charCodeAt(i),3432918353);h=h<<13|h>>>19;}return (h>>>0)||12345;}
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return ((t^t>>>14)>>>0)/4294967296;};}

/* ---------- Generator ---------- */
function weatherBonus(obj,weather){
  if(!weather) return 1;
  if(obj.wetter.includes(weather)){
    // besondere Hochgewichtung passender Funde
    if(weather==='nach_regen'&&['schnecke','pilz','fliegenpilz','regenwurm','baumpilz'].includes(obj.id))return 2.5;
    if(weather==='schnee'&&['pfotenabdruck','schneeflocke','eiszapfen','tannenzapfen'].includes(obj.id))return 2.2;
    return 1.6;
  }
  return 0.35; // passt nicht zum Wetter -> stark abgewertet, aber nicht raus
}
function difficultyFactor(obj,diff){
  // diff 1 bevorzugt leichte Objekte, diff 3 lässt schwere zu
  if(diff===1) return obj.schwierigkeit===1?1.8:(obj.schwierigkeit===2?0.6:0.15);
  if(diff===2) return obj.schwierigkeit<=2?1.2:0.6;
  return 1.0;
}
function weightedSample(pool, n, rng){
  const chosen=[]; const items=pool.map(p=>({...p}));
  const catCount={};
  const maxPerCat=Math.max(3, Math.ceil(n/4));
  while(chosen.length<n && items.length){
    const avail=items.filter(it=> (catCount[it.kategorie]||0)<maxPerCat);
    const use=avail.length?avail:items;
    const total=use.reduce((s,it)=>s+it._w,0);
    let r=rng()*total, pick=use[0];
    for(const it of use){ r-=it._w; if(r<=0){pick=it;break;} }
    chosen.push(pick);
    catCount[pick.kategorie]=(catCount[pick.kategorie]||0)+1;
    const idx=items.indexOf(pick); items.splice(idx,1);
  }
  return chosen;
}
function generatePool(ctx, rng){
  // 1. harter Filter: Jahreszeit, Habitat, Tageszeit
  let pool=DATA.filter(o=>
    o.jahreszeiten.includes(ctx.season) &&
    o.habitat.includes(ctx.habitat) &&
    o.tageszeit.includes(ctx.time));
  // Fallback: Tageszeit lockern, falls zu wenige
  if(pool.length<25) pool=DATA.filter(o=>o.jahreszeiten.includes(ctx.season)&&o.habitat.includes(ctx.habitat));
  // Fallback: Habitat lockern
  if(pool.length<25) pool=DATA.filter(o=>o.jahreszeiten.includes(ctx.season));
  if(pool.length<25) pool=DATA.slice();
  // 2. gewichten
  const diff=parseInt(document.getElementById('difficulty').value,10);
  pool=pool.map(o=>({...o,_w:(o.gewicht||1)*weatherBonus(o,ctx.weather)*difficultyFactor(o,diff)}));
  // 3. 25 ziehen
  return weightedSample(pool,25,rng);
}
function shuffle(arr,rng){const a=arr.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

/* ---------- Spiel erstellen ---------- */
function createGame(){
  if(!state.season||!state.habitat||!state.time){alert('Bitte Jahreszeit, Tageszeit und Habitat wählen.');return;}
  const nP=Math.min(10,Math.max(1,parseInt(document.getElementById('players').value||'1',10)));
  const seedStr=document.getElementById('seed').value.trim()||('wb'+Date.now());
  const baseRng=mulberry32(strToSeed(seedStr));
  const ctx={season:state.season,weather:state.weather,time:state.time,habitat:state.habitat};
  const pool=generatePool(ctx,baseRng);
  // jeder Spieler: gleicher Pool, andere Anordnung
  state.cards=[]; state.found=[];
  for(let p=0;p<nP;p++){
    const rng=mulberry32(strToSeed(seedStr+'_'+p));
    state.cards.push(shuffle(pool,rng));
    state.found.push(new Set());
  }
  state.activePlayer=0; state.ctx=ctx; state.seedStr=seedStr;
  document.getElementById('setup').style.display='none';
  document.getElementById('game').style.display='block';
  renderCtxBanner(); renderPlayerTabs(); renderCard(); window.scrollTo(0,0);
}
function ctxLabels(){
  const lbl=(arr,v)=>(arr.find(x=>x[0]===v)||[null,v])[1];
  return {s:lbl(SEASONS,state.ctx.season),w:state.ctx.weather?lbl(WEATHER,state.ctx.weather):'–',
    t:lbl(TIMES,state.ctx.time),h:lbl(HABITATS,state.ctx.habitat)};
}
function renderCtxBanner(){
  const l=ctxLabels();
  document.getElementById('ctxBanner').innerHTML=
    `<span>📅 <b>${l.s}</b></span><span>🌤️ <b>${l.w}</b></span><span>🕐 <b>${l.t}</b></span><span>🌳 <b>${l.h}</b></span>`+
    `<span style="margin-left:auto">Seed: ${state.seedStr}</span>`;
}
function renderPlayerTabs(){
  const c=document.getElementById('playerTabs'); c.innerHTML='';
  if(state.cards.length<2){c.style.display='none';return;} c.style.display='flex';
  state.cards.forEach((_,i)=>{
    const el=document.createElement('div');el.className='chip'+(i===state.activePlayer?' on':'');
    el.textContent='Spieler '+(i+1);el.onclick=()=>{state.activePlayer=i;renderPlayerTabs();renderCard();};
    c.appendChild(el);
  });
}
function renderCard(){
  const grid=document.getElementById('bingo'); grid.innerHTML='';
  const card=state.cards[state.activePlayer]; const found=state.found[state.activePlayer];
  card.forEach((o,idx)=>{
    const cell=document.createElement('div');
    cell.className='cell'+(found.has(idx)?' found':'');
    cell.innerHTML=`<span class="emoji">${o.emoji}</span><span class="nm">${o.name}</span><span class="info-dot">❓</span>`;
    cell.querySelector('.info-dot').onclick=(e)=>{e.stopPropagation();openInfo(o,idx);};
    cell.onclick=()=>{ if(found.has(idx))found.delete(idx);else found.add(idx); renderCard(); };
    grid.appendChild(cell);
  });
  const f=found.size;
  document.getElementById('stat').textContent=`${f} von 25 gefunden`+(checkBingo(found)?' · 🎉 BINGO!':'');
}
function checkBingo(found){
  const has=i=>found.has(i);
  for(let r=0;r<5;r++){let ok=true;for(let c=0;c<5;c++)if(!has(r*5+c))ok=false;if(ok)return true;}
  for(let c=0;c<5;c++){let ok=true;for(let r=0;r<5;r++)if(!has(r*5+c))ok=false;if(ok)return true;}
  let d1=true,d2=true;for(let i=0;i<5;i++){if(!has(i*5+i))d1=false;if(!has(i*5+(4-i)))d2=false;}
  return d1||d2;
}
/* ---------- Info-Modal ---------- */
function openInfo(o,idx){
  const found=state.found[state.activePlayer];
  const m=document.getElementById('modal');
  m.innerHTML=`<div class="big">${o.emoji}</div><h3>${o.name}</h3>
    <div class="kat">${o.kategorie}</div>
    <div class="info-block"><div class="t">Was ist das?</div><div class="v">${o.info.kurz}</div></div>
    <div class="info-block"><div class="t">Woran erkenne ich es?</div><div class="v">${o.info.erkennen}</div></div>
    <div class="info-block"><div class="t">Wusstest du?</div><div class="v">${o.info.wusstest_du}</div></div>
    <button class="btn found-btn" id="mFound">${found.has(idx)?'✓ Als nicht gefunden':'✓ Gefunden!'}</button>
    <button class="btn secondary close" id="mClose">Schließen</button>`;
  document.getElementById('modalBg').classList.add('show');
  document.getElementById('mClose').onclick=closeModal;
  document.getElementById('mFound').onclick=()=>{ if(found.has(idx))found.delete(idx);else found.add(idx); closeModal(); renderCard(); };
}
function closeModal(){document.getElementById('modalBg').classList.remove('show');}
document.getElementById('modalBg').onclick=(e)=>{if(e.target.id==='modalBg')closeModal();};

/* ---------- Druck ---------- */
function buildPrint(withInfo){
  const area=document.getElementById('printArea'); area.innerHTML='';
  const l=ctxLabels();
  const ctxLine=`Waldbingo · ${l.s} · ${l.w} · ${l.t} · ${l.h}`;
  state.cards.forEach((card,p)=>{
    const page=document.createElement('div');page.className='print-page';
    let cells=card.map(o=>`<div class="pcell"><div class="e">${o.emoji}</div><div class="n">${o.name}</div></div>`).join('');
    page.innerHTML=`<div class="pcard"><h3>🌲 Waldbingo – Spieler ${p+1}</h3>
      <div class="pctx">${ctxLine}</div><div class="pgrid">${cells}</div></div>`;
    area.appendChild(page);
  });
  if(withInfo){
    // Eine Info-Begleitseite (Pool ist für alle gleich)
    const uniq=state.cards[0];
    const page=document.createElement('div');page.className='print-page';
    let rows=uniq.map(o=>`<div style="display:flex;gap:8px;margin-bottom:5px;font-size:10px">
      <span style="font-size:18px">${o.emoji}</span><span><b>${o.name}:</b> ${o.info.kurz} ${o.info.wusstest_du}</span></div>`).join('');
    page.innerHTML=`<div class="pcard"><h3>🌲 Mehr Infos zu den Funden</h3><div class="pctx">${ctxLine}</div>${rows}</div>`;
    area.appendChild(page);
  }
}
document.getElementById('btnPrint').onclick=()=>{buildPrint(false);window.print();};
document.getElementById('btnInfoSheet').onclick=()=>{buildPrint(true);window.print();};

/* ---------- Standort & Wetter (Open-Meteo) ---------- */
function mapWeatherCode(code,temp){
  if(temp!==undefined&&temp<=0&&![71,73,75,77,85,86].includes(code))return 'frost';
  if(code===0)return 'klar';
  if([1,2,3].includes(code))return 'bewoelkt';
  if([45,48].includes(code))return 'nebel';
  if([51,53,55,56,57,61,63,65,66,67,80,81,82,95,96,99].includes(code))return 'regen';
  if([71,73,75,77,85,86].includes(code))return 'schnee';
  return 'bewoelkt';
}
async function autoDetect(){
  const msg=document.getElementById('autoMsg');
  if(!navigator.geolocation){msg.textContent='Standort wird vom Browser nicht unterstützt – bitte manuell wählen.';return;}
  msg.textContent='📍 Standort wird ermittelt…';
  navigator.geolocation.getCurrentPosition(async pos=>{
    const {latitude,longitude}=pos.coords;
    try{
      const url=`https://api.open-meteo.com/v1/forecast?latitude=${latitude.toFixed(3)}&longitude=${longitude.toFixed(3)}&current=temperature_2m,weather_code&timezone=auto`;
      const r=await fetch(url); const j=await r.json();
      const code=j.current.weather_code, temp=j.current.temperature_2m;
      const w=mapWeatherCode(code,temp); setChip('ch-weather',w,'weather');
      document.getElementById('wxAuto').style.display='inline';
      document.getElementById('wxAuto').textContent=`(automatisch: ${temp}°C)`;
      msg.textContent=`✅ Wetter geladen (${temp}°C). Jahreszeit & Tageszeit aus Datum/Uhrzeit gesetzt.`;
    }catch(err){
      msg.textContent='⚠️ Wetter konnte nicht geladen werden (offline?). Bitte Wetter manuell wählen.';
    }
  },err=>{
    msg.textContent='⚠️ Kein Standortzugriff. Bitte Habitat & Wetter manuell wählen.';
  },{timeout:8000});
}
document.getElementById('btnAuto').onclick=autoDetect;
document.getElementById('btnGen').onclick=createGame;
document.getElementById('btnBack').onclick=()=>{document.getElementById('game').style.display='none';document.getElementById('setup').style.display='block';window.scrollTo(0,0);};

/* ---------- Service Worker (nur über http/https) ---------- */
if('serviceWorker' in navigator && location.protocol.startsWith('http')){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
document.getElementById('hdrSub').textContent=`${DATA.length} Objekte · offline-fähig`;
</script>
</body>
