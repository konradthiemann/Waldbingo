<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#1f5b38">
<meta name="description" content="Dynamisches Wald-Bingo für Familien – offline-fähig.">
<link rel="manifest" href="manifest.webmanifest">
<title>Waldbingo</title>
<style>
  :root{
    /* Wald-Palette */
    --forest-900:#14331f; --forest-800:#1a4429; --forest-700:#1f5b38;
    --forest-600:#2f7d4f; --forest-500:#3f9d63; --forest-300:#8ed3a0; --forest-100:#dcefe1;
    --bark:#a06d44; --amber:#e8913c; --amber-600:#c4702f; --sun:#f3c44d;
    --ink:#1d2a22; --muted:#62716a; --line:#e3eae2; --line-2:#eef3ec;
    --bg:#eaf1e8; --card:#ffffff;
    --ok:#2f9e54; --ok-bg:#dcf3e2; --ok-line:#8fd6a5;
    /* Form */
    --r-sm:10px; --r:14px; --r-lg:20px; --r-xl:26px;
    --sh-1:0 1px 2px rgba(20,51,31,.06), 0 2px 8px rgba(20,51,31,.05);
    --sh-2:0 6px 22px rgba(20,51,31,.10);
    --sh-3:0 18px 50px rgba(20,51,31,.22);
    --ring:0 0 0 3px rgba(63,157,99,.45);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink); line-height:1.5; min-height:100vh;
    background:
      radial-gradient(120% 80% at 100% 0%, #f4f8f1 0%, rgba(244,248,241,0) 55%),
      radial-gradient(120% 80% at 0% 100%, #e3efe2 0%, rgba(227,239,226,0) 55%),
      var(--bg);
  }
  ::selection{background:var(--forest-300)}
  svg.pico, svg.ui-ic{display:block}
  svg.ui-ic{width:1.15em;height:1.15em}

  /* ── Header ───────────────────────────────────────────── */
  header.app{
    position:sticky;top:0;z-index:30;
    background:linear-gradient(135deg,var(--forest-700),var(--forest-900));
    color:#fff;padding:12px 16px;display:flex;align-items:center;gap:12px;
    box-shadow:0 4px 18px rgba(20,51,31,.28);
  }
  .logo{width:42px;height:42px;border-radius:13px;flex:none;
    background:linear-gradient(150deg,#3f9d63,#1f5b38);
    display:grid;place-items:center;box-shadow:inset 0 0 0 1.5px rgba(255,255,255,.25), var(--sh-1)}
  .logo svg{width:26px;height:26px}
  .brand h1{font-size:21px;margin:0;font-weight:800;letter-spacing:.2px;line-height:1}
  .brand .tag{font-size:11.5px;opacity:.82;margin-top:3px;font-weight:500}
  header .count{margin-left:auto;font-size:11.5px;font-weight:600;
    background:rgba(255,255,255,.14);padding:6px 11px;border-radius:999px;backdrop-filter:blur(4px);white-space:nowrap}

  main{max-width:920px;margin:0 auto;padding:18px 16px 40px}

  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r-xl);
    padding:20px;margin-bottom:18px;box-shadow:var(--sh-2)}

  .sec-head{display:flex;align-items:center;gap:11px;margin:0 0 18px}
  .sec-head .step{width:30px;height:30px;border-radius:10px;flex:none;
    background:var(--forest-100);color:var(--forest-700);font-weight:800;font-size:15px;
    display:grid;place-items:center}
  .sec-head h2{font-size:17px;margin:0;color:var(--forest-900);font-weight:800}

  label.field{display:flex;align-items:center;gap:7px;font-size:12.5px;font-weight:700;
    color:var(--muted);margin:16px 0 8px;text-transform:uppercase;letter-spacing:.5px}
  label.field .ui-ic{color:var(--forest-500);width:16px;height:16px}
  label.field:first-of-type{margin-top:0}

  /* Chips */
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{display:inline-flex;align-items:center;gap:6px;border:1.5px solid var(--line);
    background:#fff;border-radius:999px;padding:9px 15px;font-size:14px;font-weight:600;
    color:var(--ink);cursor:pointer;user-select:none;transition:transform .12s, background .15s, border-color .15s, box-shadow .15s}
  .chip:hover{border-color:var(--forest-300);transform:translateY(-1px)}
  .chip:focus-visible{outline:none;box-shadow:var(--ring)}
  .chip .tick{width:0;height:16px;overflow:hidden;transition:width .15s;color:#fff}
  .chip.on{background:var(--forest-600);color:#fff;border-color:var(--forest-600);box-shadow:var(--sh-1)}
  .chip.on .tick{width:16px}

  .row{display:flex;gap:14px;flex-wrap:wrap;align-items:end;margin-top:18px}
  .row > div{flex:1;min-width:150px}
  select,input[type=number],input[type=text]{width:100%;padding:11px 12px;border:1.5px solid var(--line);
    border-radius:var(--r);font-size:15px;background:#fff;color:var(--ink);font-family:inherit;transition:border-color .15s, box-shadow .15s}
  select:focus,input:focus{outline:none;border-color:var(--forest-500);box-shadow:var(--ring)}

  /* Buttons */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;
    background:linear-gradient(135deg,var(--forest-600),var(--forest-700));color:#fff;
    border:none;border-radius:var(--r);padding:14px 22px;font-size:16px;font-weight:700;
    cursor:pointer;font-family:inherit;transition:transform .12s, box-shadow .15s, filter .15s;box-shadow:var(--sh-1)}
  .btn .ui-ic{width:19px;height:19px}
  .btn:hover{filter:brightness(1.05);box-shadow:var(--sh-2)}
  .btn:active{transform:translateY(1px) scale(.99)}
  .btn:focus-visible{outline:none;box-shadow:var(--ring)}
  .btn.secondary{background:#fff;color:var(--forest-700);border:1.5px solid var(--forest-300);box-shadow:none}
  .btn.secondary:hover{background:var(--forest-100);filter:none}
  .btn.secondary .ui-ic{color:var(--forest-600)}
  .btn.ghost{background:transparent;color:var(--forest-700);border:1.5px solid var(--line);box-shadow:none}
  .btn.ghost:hover{background:var(--line-2);filter:none}
  .btn-row{display:flex;gap:11px;flex-wrap:wrap;margin-top:20px}

  .hint{font-size:12.5px;color:var(--muted);margin-top:8px;display:flex;gap:6px;align-items:flex-start}
  .hint.tip{background:var(--line-2);border:1px solid var(--line);border-radius:var(--r);padding:10px 12px;margin-top:14px}

  /* Context banner */
  .ctx-banner{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
  .ctx-pill{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:600;color:var(--forest-900);
    background:var(--forest-100);border:1px solid #cfe6d6;border-radius:999px;padding:7px 13px}
  .ctx-pill .ui-ic{width:15px;height:15px;color:var(--forest-600)}
  .ctx-pill.seed{margin-left:auto;background:#fff;border-color:var(--line);color:var(--muted);font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-weight:600}

  /* Player tabs */
  .player-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;
    background:var(--line-2);padding:5px;border-radius:var(--r);width:fit-content}
  .player-tabs .ptab{border:none;background:transparent;color:var(--muted);font-weight:700;font-size:13.5px;
    padding:7px 14px;border-radius:10px;cursor:pointer;font-family:inherit;transition:.12s}
  .player-tabs .ptab.on{background:#fff;color:var(--forest-700);box-shadow:var(--sh-1)}
  .player-tabs .ptab:focus-visible{outline:none;box-shadow:var(--ring)}

  /* Bingo grid */
  .bingo{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;max-width:560px;margin:0 auto}
  .cell{position:relative;aspect-ratio:1;background:#fff;border:1.5px solid var(--line);
    border-radius:var(--r);display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:2px;padding:6px 4px 5px;cursor:pointer;text-align:center;overflow:hidden;
    transition:transform .12s, box-shadow .15s, border-color .15s, background .15s;box-shadow:var(--sh-1)}
  .cell:hover{transform:translateY(-2px);box-shadow:var(--sh-2);border-color:var(--forest-300)}
  .cell:focus-visible{outline:none;box-shadow:var(--ring)}
  .cell .pic{width:clamp(34px,11vw,50px);height:clamp(34px,11vw,50px);display:grid;place-items:center}
  .cell .pic svg{width:100%;height:100%}
  .cell .pic .emoji{font-size:clamp(24px,8vw,38px);line-height:1}
  .cell .nm{font-size:clamp(8.5px,2.3vw,11px);font-weight:700;color:var(--ink);line-height:1.1;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .cell .info-btn{position:absolute;top:3px;right:3px;width:19px;height:19px;border-radius:50%;
    border:none;background:var(--line-2);color:var(--muted);display:grid;place-items:center;cursor:pointer;
    padding:0;transition:.12s;opacity:.8}
  .cell .info-btn .ui-ic{width:14px;height:14px}
  .cell .info-btn:hover{background:var(--forest-100);color:var(--forest-700);opacity:1}
  .cell .info-btn:focus-visible{outline:none;box-shadow:var(--ring)}
  .cell.found{background:var(--ok-bg);border-color:var(--ok-line)}
  .cell.found .nm{color:var(--forest-800)}
  .cell .check{position:absolute;inset:0;display:none;align-items:flex-start;justify-content:flex-end;padding:4px}
  .cell.found .check{display:flex}
  .cell .check .badge{width:22px;height:22px;border-radius:50%;background:var(--ok);color:#fff;
    display:grid;place-items:center;box-shadow:var(--sh-1);animation:pop .28s ease}
  .cell .check .badge .ui-ic{width:14px;height:14px}
  .cell.found .pic{animation:pop .28s ease}
  @keyframes pop{0%{transform:scale(.4);opacity:0}60%{transform:scale(1.12)}100%{transform:scale(1);opacity:1}}

  /* Progress + status */
  .progress-wrap{max-width:560px;margin:18px auto 0}
  .progress-top{display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:700;color:var(--muted);margin-bottom:7px}
  .progress-top .done{color:var(--forest-700)}
  .bar{height:9px;background:var(--line-2);border-radius:999px;overflow:hidden}
  .bar > i{display:block;height:100%;width:0;border-radius:999px;
    background:linear-gradient(90deg,var(--forest-500),var(--forest-600));transition:width .35s ease}
  .bingo-banner{display:none;align-items:center;justify-content:center;gap:10px;margin:14px auto 0;max-width:560px;
    background:linear-gradient(135deg,#fff7e6,#ffeccc);border:1.5px solid var(--sun);border-radius:var(--r-lg);
    padding:14px;color:var(--amber-600);font-weight:800;font-size:18px;box-shadow:var(--sh-1)}
  .bingo-banner.show{display:flex;animation:pop .4s ease}
  .bingo-banner .ui-ic{width:24px;height:24px;color:var(--sun)}
  .legend{font-size:12.5px;color:var(--muted);text-align:center;margin-top:14px;display:flex;gap:6px;justify-content:center;align-items:center;flex-wrap:wrap}
  .legend .ui-ic{width:15px;height:15px;color:var(--forest-500)}

  /* Modal */
  .modal-bg{position:fixed;inset:0;background:rgba(20,33,25,.5);backdrop-filter:blur(3px);
    display:none;align-items:center;justify-content:center;padding:18px;z-index:50}
  .modal-bg.show{display:flex;animation:fade .2s ease}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .modal{position:relative;background:#fff;border-radius:var(--r-xl);max-width:430px;width:100%;
    padding:26px 24px 22px;box-shadow:var(--sh-3);animation:rise .25s ease}
  @keyframes rise{from{transform:translateY(16px) scale(.98);opacity:0}to{transform:none;opacity:1}}
  .modal .x{position:absolute;top:14px;right:14px;width:32px;height:32px;border-radius:50%;border:none;
    background:var(--line-2);color:var(--muted);font-size:18px;cursor:pointer;display:grid;place-items:center;line-height:1}
  .modal .x:hover{background:var(--line)}
  .modal .hero{width:96px;height:96px;border-radius:24px;margin:0 auto 4px;display:grid;place-items:center}
  .modal .hero svg{width:64px;height:64px}
  .modal .hero .emoji{font-size:54px}
  .modal h3{text-align:center;margin:8px 0 6px;color:var(--forest-900);font-size:23px;font-weight:800}
  .modal .kat{display:block;width:fit-content;margin:0 auto 16px;font-size:11.5px;font-weight:800;
    text-transform:uppercase;letter-spacing:.6px;color:#fff;padding:4px 12px;border-radius:999px}
  .info-block{display:flex;gap:11px;margin:13px 0;align-items:flex-start}
  .info-block .mk{width:30px;height:30px;border-radius:9px;flex:none;background:var(--forest-100);
    color:var(--forest-600);display:grid;place-items:center}
  .info-block .mk .ui-ic{width:17px;height:17px}
  .info-block .tx .t{font-size:11.5px;font-weight:800;color:var(--amber-600);text-transform:uppercase;letter-spacing:.4px}
  .info-block .tx .v{font-size:14.5px;color:var(--ink);margin-top:1px}
  .modal .found-btn{width:100%;margin-top:18px}
  .modal .close{width:100%;margin-top:9px}

  /* Print */
  .print-only{display:none}
  @media print{
    @page{margin:10mm}
    header.app,.no-print{display:none !important}
    body{background:#fff}
    main{max-width:none;padding:0;margin:0}
    .print-only{display:block}
    .print-page{page-break-after:always}
    .print-page:last-child{page-break-after:auto}
    .p-head{display:flex;align-items:center;gap:8px;margin-bottom:6px}
    .p-head .plogo{width:26px;height:26px;border-radius:7px;background:#1f5b38;display:grid;place-items:center}
    .p-head .plogo svg{width:17px;height:17px}
    .p-head h3{margin:0;color:#14331f;font-size:16px}
    .pctx{font-size:10.5px;color:#444;margin:0 0 8px 34px}
    .pgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px}
    .pcell{border:1px solid #b8cfbe;border-radius:7px;aspect-ratio:1;display:flex;flex-direction:column;
      align-items:center;justify-content:center;text-align:center;padding:3px;gap:2px;
      -webkit-print-color-adjust:exact;print-color-adjust:exact}
    .pcell .pic{width:60%;height:48%}.pcell .pic svg{width:100%;height:100%}.pcell .pic .emoji{font-size:24px}
    .pcell .n{font-size:8px;font-weight:600;line-height:1.05}
    .inforow{display:flex;gap:9px;margin-bottom:7px;align-items:flex-start;
      -webkit-print-color-adjust:exact;print-color-adjust:exact}
    .inforow .pic{width:26px;height:26px;flex:none}.inforow .pic svg{width:100%;height:100%}.inforow .pic .emoji{font-size:20px}
    .inforow .tx{font-size:10.5px}.inforow .tx b{color:#1f5b38}
  }
  @media (prefers-reduced-motion:reduce){*{animation:none !important;transition:none !important}}
</style>
</head>
<body>
<header class="app">
  <div class="logo" id="logo"></div>
  <div class="brand">
    <h1>Waldbingo</h1>
    <div class="tag">Such-Spiel für den Wald · offline-fähig</div>
  </div>
  <div class="count" id="hdrSub"></div>
</header>

<main>
  <!-- SETUP -->
  <section id="setup" class="card">
    <div class="sec-head"><div class="step">1</div><h2>Wo &amp; wann seid ihr unterwegs?</h2></div>

    <label class="field" id="lbl-season">Jahreszeit</label>
    <div class="chips" id="ch-season"></div>

    <label class="field" id="lbl-weather">Wetter <span id="wxAuto" class="hint" style="display:none;margin:0"></span></label>
    <div class="chips" id="ch-weather"></div>

    <label class="field" id="lbl-time">Tageszeit</label>
    <div class="chips" id="ch-time"></div>

    <label class="field" id="lbl-habitat">Wo seid ihr? (Habitat)</label>
    <div class="chips" id="ch-habitat"></div>

    <div class="row">
      <div>
        <label class="field" style="margin:0 0 8px">Schwierigkeit</label>
        <select id="difficulty">
          <option value="1">Leicht (kleine Kinder)</option>
          <option value="2" selected>Mittel</option>
          <option value="3">Experte (auch seltene Funde)</option>
        </select>
      </div>
      <div>
        <label class="field" style="margin:0 0 8px">Anzahl Spieler (1–10)</label>
        <input type="number" id="players" min="1" max="10" value="1">
      </div>
      <div>
        <label class="field" style="margin:0 0 8px">Seed (optional)</label>
        <input type="text" id="seed" placeholder="z. B. wald42">
      </div>
    </div>

    <div class="btn-row">
      <button class="btn secondary" id="btnAuto"></button>
      <button class="btn" id="btnGen"></button>
    </div>
    <div class="hint" id="autoMsg"></div>
    <div class="hint tip">Tipp: Erst online erstellen (lädt Wetter), dann offline in den Wald – Abhaken und Infos gehen ohne Netz.</div>
  </section>

  <!-- GAME -->
  <section id="game" class="card" style="display:none">
    <div class="ctx-banner" id="ctxBanner"></div>
    <div class="player-tabs no-print" id="playerTabs"></div>
    <div class="bingo" id="bingo"></div>
    <div class="progress-wrap">
      <div class="progress-top"><span id="statTxt"></span><span class="done" id="statBingo"></span></div>
      <div class="bar"><i id="bar"></i></div>
    </div>
    <div class="bingo-banner" id="bingoBanner"></div>
    <div class="legend" id="legend"></div>
    <div class="btn-row no-print">
      <button class="btn secondary" id="btnPrint"></button>
      <button class="btn secondary" id="btnInfoSheet"></button>
      <button class="btn ghost" id="btnBack"></button>
    </div>
  </section>

  <!-- PRINT AREA -->
  <div id="printArea" class="print-only"></div>
</main>

<!-- Info Modal -->
<div class="modal-bg" id="modalBg">
  <div class="modal" id="modal"></div>
</div>

<script src="objects.data.js"></script>
<script src="pictograms.js"></script>
<script>
/* ---------- Daten & Vokabular ---------- */
const DATA = (window.WB_DATA && window.WB_DATA.objekte) || [];
const SEASONS = [["fruehling","Frühling"],["sommer","Sommer"],["herbst","Herbst"],["winter","Winter"]];
const WEATHER = [["klar","Klar"],["bewoelkt","Bewölkt"],["regen","Regen"],["nach_regen","Nach Regen"],["schnee","Schnee"],["frost","Frost"],["wind","Wind"],["nebel","Nebel"]];
const TIMES = [["morgen","Morgen"],["tag","Tag"],["abend","Abend"],["daemmerung","Dämmerung"],["nacht","Nacht"]];
const HABITATS = [["laubwald","Laubwald"],["nadelwald","Nadelwald"],["mischwald","Mischwald"],["gewaesser","Am Wasser"],["lichtung","Lichtung"],["feldrand","Feldrand"],["park","Park"],["gebirge","Gebirge"]];

/* Kategorie-Farben (für Modal-Piktogramm & Pille) */
const CAT_COLOR = {Tier:"#c4702f",Vogel:"#3f7fb8",Insekt:"#e8913c",Pflanze:"#2f9e54",Baum:"#8a5a36",Pilz:"#d8564c",Spur:"#6e787d",Landschaft:"#2f9e8e"};
const catColor = k => CAT_COLOR[k] || "#2f7d4f";
const icon = o => (window.WB_ICON && WB_ICON(o.iconId,'pico')) || `<span class="emoji">${o.emoji}</span>`;
const ui = (n,c) => (window.WB_UI && WB_UI(n,c)) || '';

/* ---------- Statisches UI mit Glyphen füllen ---------- */
document.getElementById('logo').innerHTML = ui('leaf');
document.getElementById('lbl-season').insertAdjacentHTML('afterbegin', ui('season'));
document.getElementById('lbl-weather').insertAdjacentHTML('afterbegin', ui('weather'));
document.getElementById('lbl-time').insertAdjacentHTML('afterbegin', ui('clock'));
document.getElementById('lbl-habitat').insertAdjacentHTML('afterbegin', ui('habitat'));
document.getElementById('btnAuto').innerHTML = ui('pin') + 'Automatisch (Standort &amp; Wetter)';
document.getElementById('btnGen').innerHTML = ui('dice') + 'Bingo erstellen';
document.getElementById('btnPrint').innerHTML = ui('printer') + 'Drucken / als PDF';
document.getElementById('btnInfoSheet').innerHTML = ui('doc') + 'Info-Begleitseite';
document.getElementById('btnBack').innerHTML = ui('back') + 'Neues Spiel';
document.getElementById('legend').innerHTML = 'Tippe ein Feld an, wenn du es gefunden hast – ' + ui('info') + ' öffnet mehr Infos.';

/* ---------- Zustand ---------- */
const state = { season:null, weather:null, time:null, habitat:null,
  cards:[], activePlayer:0, found:[] };

/* ---------- Auswahl-Chips (single-select Gruppen) ---------- */
function buildChips(containerId, opts, key){
  const c = document.getElementById(containerId);
  opts.forEach(([val,label])=>{
    const el = document.createElement('button');
    el.type='button'; el.className='chip'; el.dataset.val=val;
    el.innerHTML = `<span class="tick">${ui('check')}</span>${label}`;
    el.onclick=()=>{ state[key]=val;
      [...c.children].forEach(x=>x.classList.toggle('on',x.dataset.val===val)); };
    c.appendChild(el);
  });
}
function setChip(containerId,val,key){
  state[key]=val;
  const c=document.getElementById(containerId);
  [...c.children].forEach(x=>x.classList.toggle('on',x.dataset.val===val));
}
buildChips('ch-season',SEASONS,'season');
buildChips('ch-weather',WEATHER,'weather');
buildChips('ch-time',TIMES,'time');
buildChips('ch-habitat',HABITATS,'habitat');

/* ---------- Auto-Defaults aus Datum/Uhrzeit ---------- */
function seasonFromDate(d){const m=d.getMonth()+1;
  if(m>=3&&m<=5)return'fruehling';if(m>=6&&m<=8)return'sommer';if(m>=9&&m<=11)return'herbst';return'winter';}
function timeFromHour(h){if(h>=5&&h<10)return'morgen';if(h<17)return'tag';if(h<20)return'abend';if(h<22)return'daemmerung';return'nacht';}
(function initDefaults(){
  const now=new Date();
  setChip('ch-season',seasonFromDate(now),'season');
  setChip('ch-time',timeFromHour(now.getHours()),'time');
  setChip('ch-weather','bewoelkt','weather');
  setChip('ch-habitat','mischwald','habitat');
})();

/* ---------- Seeded RNG (mulberry32) ---------- */
function strToSeed(s){let h=1779033703^s.length;for(let i=0;i<s.length;i++){h=Math.imul(h^s.charCodeAt(i),3432918353);h=h<<13|h>>>19;}return (h>>>0)||12345;}
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return ((t^t>>>14)>>>0)/4294967296;};}

/* ---------- Generator ---------- */
function weatherBonus(obj,weather){
  if(!weather) return 1;
  if(obj.wetter.includes(weather)){
    if(weather==='nach_regen'&&['schnecke','pilz','fliegenpilz','regenwurm','baumpilz'].includes(obj.id))return 2.5;
    if(weather==='schnee'&&['pfotenabdruck','schneeflocke','eiszapfen','tannenzapfen'].includes(obj.id))return 2.2;
    return 1.6;
  }
  return 0.35;
}
function difficultyFactor(obj,diff){
  if(diff===1) return obj.schwierigkeit===1?1.8:(obj.schwierigkeit===2?0.6:0.15);
  if(diff===2) return obj.schwierigkeit<=2?1.2:0.6;
  return 1.0;
}
function weightedSample(pool, n, rng){
  const chosen=[]; const items=pool.map(p=>({...p}));
  const catCount={};
  const maxPerCat=Math.max(3, Math.ceil(n/4));
  while(chosen.length<n && items.length){
    const avail=items.filter(it=> (catCount[it.kategorie]||0)<maxPerCat);
    const use=avail.length?avail:items;
    const total=use.reduce((s,it)=>s+it._w,0);
    let r=rng()*total, pick=use[0];
    for(const it of use){ r-=it._w; if(r<=0){pick=it;break;} }
    chosen.push(pick);
    catCount[pick.kategorie]=(catCount[pick.kategorie]||0)+1;
    const idx=items.indexOf(pick); items.splice(idx,1);
  }
  return chosen;
}
function generatePool(ctx, rng){
  let pool=DATA.filter(o=>
    o.jahreszeiten.includes(ctx.season) &&
    o.habitat.includes(ctx.habitat) &&
    o.tageszeit.includes(ctx.time));
  if(pool.length<25) pool=DATA.filter(o=>o.jahreszeiten.includes(ctx.season)&&o.habitat.includes(ctx.habitat));
  if(pool.length<25) pool=DATA.filter(o=>o.jahreszeiten.includes(ctx.season));
  if(pool.length<25) pool=DATA.slice();
  const diff=parseInt(document.getElementById('difficulty').value,10);
  pool=pool.map(o=>({...o,_w:(o.gewicht||1)*weatherBonus(o,ctx.weather)*difficultyFactor(o,diff)}));
  return weightedSample(pool,25,rng);
}
function shuffle(arr,rng){const a=arr.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

/* ---------- Spiel erstellen ---------- */
function createGame(){
  if(!state.season||!state.habitat||!state.time){alert('Bitte Jahreszeit, Tageszeit und Habitat wählen.');return;}
  const nP=Math.min(10,Math.max(1,parseInt(document.getElementById('players').value||'1',10)));
  const seedStr=document.getElementById('seed').value.trim()||('wb'+Date.now());
  const baseRng=mulberry32(strToSeed(seedStr));
  const ctx={season:state.season,weather:state.weather,time:state.time,habitat:state.habitat};
  const pool=generatePool(ctx,baseRng);
  state.cards=[]; state.found=[];
  for(let p=0;p<nP;p++){
    const rng=mulberry32(strToSeed(seedStr+'_'+p));
    state.cards.push(shuffle(pool,rng));
    state.found.push(new Set());
  }
  state.activePlayer=0; state.ctx=ctx; state.seedStr=seedStr;
  document.getElementById('setup').style.display='none';
  document.getElementById('game').style.display='block';
  renderCtxBanner(); renderPlayerTabs(); renderCard(); window.scrollTo(0,0);
}
function ctxLabels(){
  const lbl=(arr,v)=>(arr.find(x=>x[0]===v)||[null,v])[1];
  return {s:lbl(SEASONS,state.ctx.season),w:state.ctx.weather?lbl(WEATHER,state.ctx.weather):'–',
    t:lbl(TIMES,state.ctx.time),h:lbl(HABITATS,state.ctx.habitat)};
}
function renderCtxBanner(){
  const l=ctxLabels();
  document.getElementById('ctxBanner').innerHTML=
    `<span class="ctx-pill">${ui('season')}<b>${l.s}</b></span>`+
    `<span class="ctx-pill">${ui('weather')}<b>${l.w}</b></span>`+
    `<span class="ctx-pill">${ui('clock')}<b>${l.t}</b></span>`+
    `<span class="ctx-pill">${ui('habitat')}<b>${l.h}</b></span>`+
    `<span class="ctx-pill seed">${ui('seed')}${state.seedStr}</span>`;
}
function renderPlayerTabs(){
  const c=document.getElementById('playerTabs'); c.innerHTML='';
  if(state.cards.length<2){c.style.display='none';return;} c.style.display='flex';
  state.cards.forEach((_,i)=>{
    const el=document.createElement('button');el.type='button';el.className='ptab'+(i===state.activePlayer?' on':'');
    el.textContent='Spieler '+(i+1);el.onclick=()=>{state.activePlayer=i;renderPlayerTabs();renderCard();};
    c.appendChild(el);
  });
}
function renderCard(){
  const grid=document.getElementById('bingo'); grid.innerHTML='';
  const card=state.cards[state.activePlayer]; const found=state.found[state.activePlayer];
  card.forEach((o,idx)=>{
    const cell=document.createElement('div');
    cell.className='cell'+(found.has(idx)?' found':'');
    cell.tabIndex=0; cell.setAttribute('role','button');
    cell.setAttribute('aria-pressed',found.has(idx)?'true':'false');
    cell.setAttribute('aria-label',o.name+(found.has(idx)?' – gefunden':''));
    cell.innerHTML=`<span class="pic">${icon(o)}</span><span class="nm">${o.name}</span>`+
      `<button type="button" class="info-btn" aria-label="Mehr Infos zu ${o.name}">${ui('info')}</button>`+
      `<span class="check"><span class="badge">${ui('check')}</span></span>`;
    const toggle=()=>{
      if(found.has(idx))found.delete(idx);else found.add(idx);
      const on=found.has(idx);
      cell.classList.toggle('found',on);
      cell.setAttribute('aria-pressed',on?'true':'false');
      cell.setAttribute('aria-label',o.name+(on?' – gefunden':''));
      updateProgress(found);
    };
    cell.onclick=toggle;
    cell.onkeydown=(e)=>{ if(e.key===' '||e.key==='Enter'){e.preventDefault();toggle();} };
    cell.querySelector('.info-btn').onclick=(e)=>{e.stopPropagation();openInfo(o,idx);};
    grid.appendChild(cell);
  });
  updateProgress(found);
}
function updateProgress(found){
  const f=found.size, win=checkBingo(found);
  document.getElementById('statTxt').textContent=`${f} von 25 gefunden`;
  document.getElementById('statBingo').textContent= win?'Bingo erreicht!':'';
  document.getElementById('bar').style.width=(f/25*100)+'%';
  const banner=document.getElementById('bingoBanner');
  if(win){ banner.innerHTML=ui('sparkle')+'BINGO! Super gemacht!'+ui('sparkle'); banner.classList.add('show'); }
  else banner.classList.remove('show');
}
function checkBingo(found){
  const has=i=>found.has(i);
  for(let r=0;r<5;r++){let ok=true;for(let c=0;c<5;c++)if(!has(r*5+c))ok=false;if(ok)return true;}
  for(let c=0;c<5;c++){let ok=true;for(let r=0;r<5;r++)if(!has(r*5+c))ok=false;if(ok)return true;}
  let d1=true,d2=true;for(let i=0;i<5;i++){if(!has(i*5+i))d1=false;if(!has(i*5+(4-i)))d2=false;}
  return d1||d2;
}
/* ---------- Info-Modal ---------- */
function openInfo(o,idx){
  const found=state.found[state.activePlayer];
  const col=catColor(o.kategorie);
  const tint=col+'22';
  const m=document.getElementById('modal');
  m.innerHTML=`<button type="button" class="x" id="mX" aria-label="Schließen">✕</button>
    <div class="hero" style="background:${tint}">${icon(o)}</div>
    <h3>${o.name}</h3>
    <span class="kat" style="background:${col}">${o.kategorie}</span>
    <div class="info-block"><div class="mk">${ui('info')}</div><div class="tx"><div class="t">Was ist das?</div><div class="v">${o.info.kurz}</div></div></div>
    <div class="info-block"><div class="mk">${ui('weather')}</div><div class="tx"><div class="t">Woran erkenne ich es?</div><div class="v">${o.info.erkennen}</div></div></div>
    <div class="info-block"><div class="mk">${ui('sparkle')}</div><div class="tx"><div class="t">Wusstest du?</div><div class="v">${o.info.wusstest_du}</div></div></div>
    <button class="btn found-btn" id="mFound">${ui('check')}${found.has(idx)?'Als nicht gefunden markieren':'Gefunden!'}</button>
    <button class="btn ghost close" id="mClose">Schließen</button>`;
  document.getElementById('modalBg').classList.add('show');
  document.getElementById('mClose').onclick=closeModal;
  document.getElementById('mX').onclick=closeModal;
  document.getElementById('mFound').onclick=()=>{ if(found.has(idx))found.delete(idx);else found.add(idx); closeModal(); renderCard(); };
}
function closeModal(){document.getElementById('modalBg').classList.remove('show');}
document.getElementById('modalBg').onclick=(e)=>{if(e.target.id==='modalBg')closeModal();};
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

/* ---------- Druck ---------- */
function buildPrint(withInfo){
  const area=document.getElementById('printArea'); area.innerHTML='';
  const l=ctxLabels();
  const ctxLine=`${l.s} · ${l.w} · ${l.t} · ${l.h}`;
  const head=(title)=>`<div class="p-head"><div class="plogo">${ui('leaf')}</div><h3>${title}</h3></div>`;
  state.cards.forEach((card,p)=>{
    const page=document.createElement('div');page.className='print-page';
    let cells=card.map(o=>`<div class="pcell"><div class="pic">${icon(o)}</div><div class="n">${o.name}</div></div>`).join('');
    page.innerHTML=head(`Waldbingo – Spieler ${p+1}`)+`<div class="pctx">${ctxLine}</div><div class="pgrid">${cells}</div>`;
    area.appendChild(page);
  });
  if(withInfo){
    const uniq=state.cards[0];
    const page=document.createElement('div');page.className='print-page';
    let rows=uniq.map(o=>`<div class="inforow"><div class="pic">${icon(o)}</div><div class="tx"><b>${o.name}:</b> ${o.info.kurz} ${o.info.wusstest_du}</div></div>`).join('');
    page.innerHTML=head('Mehr Infos zu den Funden')+`<div class="pctx">${ctxLine}</div>${rows}`;
    area.appendChild(page);
  }
}
document.getElementById('btnPrint').onclick=()=>{buildPrint(false);window.print();};
document.getElementById('btnInfoSheet').onclick=()=>{buildPrint(true);window.print();};

/* ---------- Standort & Wetter (Open-Meteo) ---------- */
function mapWeatherCode(code,temp){
  if(temp!==undefined&&temp<=0&&![71,73,75,77,85,86].includes(code))return 'frost';
  if(code===0)return 'klar';
  if([1,2,3].includes(code))return 'bewoelkt';
  if([45,48].includes(code))return 'nebel';
  if([51,53,55,56,57,61,63,65,66,67,80,81,82,95,96,99].includes(code))return 'regen';
  if([71,73,75,77,85,86].includes(code))return 'schnee';
  return 'bewoelkt';
}
async function autoDetect(){
  const msg=document.getElementById('autoMsg');
  if(!navigator.geolocation){msg.textContent='Standort wird vom Browser nicht unterstützt – bitte manuell wählen.';return;}
  msg.textContent='Standort wird ermittelt…';
  navigator.geolocation.getCurrentPosition(async pos=>{
    const {latitude,longitude}=pos.coords;
    try{
      const url=`https://api.open-meteo.com/v1/forecast?latitude=${latitude.toFixed(3)}&longitude=${longitude.toFixed(3)}&current=temperature_2m,weather_code&timezone=auto`;
      const r=await fetch(url); const j=await r.json();
      const code=j.current.weather_code, temp=j.current.temperature_2m;
      const w=mapWeatherCode(code,temp); setChip('ch-weather',w,'weather');
      document.getElementById('wxAuto').style.display='inline';
      document.getElementById('wxAuto').textContent=`(automatisch: ${temp}°C)`;
      msg.textContent=`Wetter geladen (${temp}°C). Jahreszeit & Tageszeit aus Datum/Uhrzeit gesetzt.`;
    }catch(err){
      msg.textContent='Wetter konnte nicht geladen werden (offline?). Bitte Wetter manuell wählen.';
    }
  },err=>{
    msg.textContent='Kein Standortzugriff. Bitte Habitat & Wetter manuell wählen.';
  },{timeout:8000});
}
document.getElementById('btnAuto').onclick=autoDetect;
document.getElementById('btnGen').onclick=createGame;
document.getElementById('btnBack').onclick=()=>{document.getElementById('game').style.display='none';document.getElementById('setup').style.display='block';window.scrollTo(0,0);};

/* ---------- Service Worker (nur über http/https) ---------- */
if('serviceWorker' in navigator && location.protocol.startsWith('http')){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
document.getElementById('hdrSub').textContent=`${DATA.length} Objekte · offline`;
